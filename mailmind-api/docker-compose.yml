services:
  postgres:
    image: postgres:16
    container_name: mailmind-postgres
    environment:
      POSTGRES_DB: mailmind
      POSTGRES_USER: mailmind
      POSTGRES_PASSWORD: mailmind_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata_mailmind:/var/lib/postgresql/data

  classifier:
    build: ./ml
    container_name: mailmind-classifier
    ports:
      - "8001:8001"
    restart: unless-stopped

volumes:
  pgdata_mailmind: